name: Pipeline horaire - Qualité de l'air

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: feat/air-quality-pipeline

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync

      - name: Extract (OpenWeatherMap)
        run: uv run python src/extract.py
        env:
          OPENWEATHERMAP_API_KEY: ${{ secrets.OWM_API_KEY }}

      - name: Transform
        run: uv run python src/transform.py

      - name: Validate
        run: uv run python src/validate.py

      - name: Load warehouse (Neon.tech)
        run: uv run python src/load_warehouse.py
        env:
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No new data to commit"
          else
            git commit -m "chore(data): automatic pipeline run $(date -u +'%Y-%m-%d %H:%M UTC')"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
            git push
          fi
